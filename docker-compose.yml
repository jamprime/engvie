services:
  postgres:
    image: postgres:15-alpine
    container_name: engvie-postgres
    environment:
      POSTGRES_DB: engvie
      POSTGRES_USER: engvie_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engvie_user -d engvie"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engvie-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./engvie-backend
      dockerfile: Dockerfile
    container_name: engvie-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/engvie
      DATABASE_USERNAME: engvie_user
      DATABASE_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your_bot_token_here}
      MINI_APP_URL: ${MINI_APP_URL:-}
      JWT_SECRET: ${JWT_SECRET:-engvie-super-secret-key-min-32-characters-long}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./engvie-frontend
      dockerfile: Dockerfile
    container_name: engvie-frontend
    ports:
      - "8888:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

