services:
  postgres:
    image: postgres:15-alpine
    container_name: engvie-postgres-dev
    environment:
      POSTGRES_DB: engvie
      POSTGRES_USER: engvie_user
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engvie_user -d engvie"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: engvie-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./engvie-backend
      dockerfile: Dockerfile
    container_name: engvie-backend-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/engvie
      DATABASE_USERNAME: engvie_user
      DATABASE_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TELEGRAM_BOT_TOKEN: dummy_dev_token
      JWT_SECRET: engvie-super-secret-key-min-32-characters-long
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_dev_data:
